<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de QR Codes - Flex</title>
    <link rel="stylesheet" href="flex.css">
</head>
<body>
    <div id="content">
        <header class="hero">
            <div>
                <p class="eyebrow">Painel de QR Codes</p>
                <h1>Gerencie seus códigos </h1>
                <p class="subtitle">Mesmo conteúdo, agora em uma versão com flex</p>
            </div>
        </header>

        <section class="card">
            <h2>Adicionar Cliente</h2>
            <div class="form-row">
                <input id="clientCodeName" placeholder="Código e Nome" type="text">
                <input id="clientLink" placeholder="Link do Mapa" type="url">
            </div>
            <div class="button-row">
                <button id="addClientButton" class="btn btn-primary" onclick="addClient()">Adicionar Cliente</button>
                <button class="btn btn-secondary" onclick="clearEdit()" type="button">Cancelar Edição</button>
            </div>
            <div id="clientsList" class="list-card"></div>
        </section>

        <section class="card">
            <h2>Lista de Códigos</h2>
            <textarea id="codesList" readonly placeholder="Códigos separados por vírgula"></textarea>
            <div class="button-row">
                <button class="btn btn-primary" onclick="copyCodes()">Copiar Códigos</button>
            </div>
        </section>

        <section class="card" id="qrSection">
            <h2>Gerar QR Codes</h2>
            <div class="button-row wrap">
                <button class="btn btn-primary" onclick="generateQRs()">Gerar QR Codes para Todos os Clientes</button>
                <button class="btn btn-secondary" onclick="printPage()">Imprimir QR Codes</button>
                <button class="btn btn-secondary" onclick="downloadAllQRs()">⬇ Baixar Todos os QR Codes</button>
            </div>
            <div class="form-row">
                <input id="filter" placeholder="Filtrar por nome do cliente" oninput="filterQRs()" type="text">
            </div>
            <div id="qrs"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
